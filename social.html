<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universe Social | 4E Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --neon: #8a2be2; --glass: rgba(255, 255, 255, 0.1); }
        body { background: #0a0a0c; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 30px; }
        
        .header { background: rgba(10, 10, 12, 0.8); backdrop-filter: blur(10px); padding: 15px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--neon); text-align: center; }
        .container { max-width: 500px; margin: auto; padding: 15px; }

        /* ПРОФИЛЬ */
        .my-card { background: var(--glass); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .my-ava { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--neon); object-fit: cover; }
        .my-info b { display: block; font-size: 18px; }
        .my-role { font-size: 10px; background: var(--neon); padding: 2px 8px; border-radius: 10px; text-transform: uppercase; }

        /* СОЗДАНИЕ ПОСТА */
        .create-post { background: var(--glass); border-radius: 20px; padding: 20px; margin-bottom: 25px; border: 1px solid var(--neon); }
        textarea { width: 100%; background: none; border: none; color: white; font-size: 16px; outline: none; resize: none; }
        .img-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px dashed #444; border-radius: 10px; padding: 8px; color: #888; font-size: 12px; margin-top: 10px; box-sizing: border-box; }
        .btn-post { background: var(--neon); color: white; border: none; padding: 10px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; float: right; margin-top: 10px; }

        /* ЛЕНТА */
        .post { background: var(--glass); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .post-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; position: relative; }
        .post-ava { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .post-user { font-weight: bold; font-size: 14px; }
        .post-time { font-size: 10px; color: #666; }

        .post-img { width: 100%; border-radius: 15px; margin-top: 10px; border: 1px solid #222; }
        .post-text { margin-top: 10px; line-height: 1.4; color: #ddd; }

        /* ЛАЙКИ И КНОПКИ */
        .post-actions { display: flex; gap: 20px; margin-top: 15px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        .action { cursor: pointer; color: #888; transition: 0.2s; font-size: 14px; }
        .action:hover { color: white; }
        .liked { color: #ff3b30 !important; }

        .del-btn { position: absolute; right: 0; color: #ff3b30; cursor: pointer; font-size: 14px; opacity: 0.5; }
        .del-btn:hover { opacity: 1; }

        .back-link { text-align: center; display: block; color: #666; text-decoration: none; font-size: 13px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; letter-spacing: 2px; color: var(--neon);">UNIVERSE</h2>
</div>

<div class="container">
    
    <div class="my-card">
        <img id="myAvaDisplay" src="https://i.imgur.com/6VBx3io.png" class="my-ava">
        <div class="my-info">
            <b id="myNameDisplay">Загрузка...</b>
            <span id="myRoleDisplay" class="my-role">Ученик</span>
        </div>
    </div>

    <div class="create-post">
        <textarea id="postText" placeholder="Расскажи что-нибудь..."></textarea>
        <input id="postImg" class="img-input" placeholder="Ссылка на фото (если есть)">
        <button class="btn-post" onclick="sendPost()">Опубликовать</button>
        <div style="clear:both;"></div>
    </div>

    <div id="feed"></div>

    <a href="index.html" class="back-link">🔙 Вернуться в Школу</a>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyDw7KtHos2d88AdeK5eTQSqd5TaAMl2uwc", projectId: "e-my-fam" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Получаем данные из входа (из index.html)
const me = localStorage.getItem('curUser') || "Гость";
let myData = {};

function initApp() {
    // Подгружаем роль и аватарку из базы данных пользователей
    db.collection("users").doc(me).onSnapshot(doc => {
        if(doc.exists) {
            myData = doc.data();
            document.getElementById('myNameDisplay').innerText = me;
            document.getElementById('myRoleDisplay').innerText = myData.role || "Ученик";
            if(myData.ava) document.getElementById('myAvaDisplay').src = myData.ava;
        }
    });
    loadFeed();
}

// ПУБЛИКАЦИЯ
function sendPost() {
    const text = document.getElementById('postText').value;
    const img = document.getElementById('postImg').value;
    
    if(text || img) {
        db.collection("posts").add({
            u: me,
            ava: myData.ava || "https://i.imgur.com/6VBx3io.png",
            role: myData.role || "Ученик",
            t: text,
            img: img.trim(),
            likes: 0,
            likedBy: [],
            time: Date.now()
        });
        document.getElementById('postText').value = "";
        document.getElementById('postImg').value = "";
    }
}

// ЛЕНТА В РЕАЛЬНОМ ВРЕМЕНИ
function loadFeed() {
    db.collection("posts").orderBy("time", "desc").onSnapshot(snap => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        snap.forEach(doc => {
            const p = doc.data();
            const id = doc.id;
            const isLiked = p.likedBy && p.likedBy.includes(me);
            const canDelete = (me === "Ерасыл" || p.u === me); // Ты можешь удалять всё

            feed.innerHTML += `
                <div class="post">
                    <div class="post-head">
                        <img src="${p.ava}" class="post-ava">
                        <div class="post-user">
                            ${p.u} <span style="font-size:9px; color:var(--neon)">${p.role}</span><br>
                            <span class="post-time">${new Date(p.time).toLocaleString()}</span>
                        </div>
                        ${canDelete ? `<i class="fa-solid fa-trash-can del-btn" onclick="delPost('${id}')"></i>` : ''}
                    </div>
                    <div class="post-text">${p.t}</div>
                    ${p.img ? `<img src="${p.img}" class="post-img">` : ''}
                    <div class="post-actions">
                        <span class="action ${isLiked ? 'liked' : ''}" onclick="likePost('${id}')">
                            <i class="fa-${isLiked ? 'solid' : 'regular'} fa-heart"></i> ${p.likes}
                        </span>
                        <span class="action"><i class="fa-regular fa-comment"></i> Комменты</span>
                    </div>
                </div>
            `;
        });
    });
}

// ЛАЙКИ
function likePost(id) {
    const ref = db.collection("posts").doc(id);
    db.runTransaction(async (t) => {
        const doc = await t.get(ref);
        const d = doc.data();
        let likes = d.likes || 0;
        let lb = d.likedBy || [];
        
        if(lb.includes(me)) {
            lb = lb.filter(u => u !== me);
            likes--;
        } else {
            lb.push(me);
            likes++;
        }
        t.update(ref, { likes: likes, likedBy: lb });
    });
}

// УДАЛЕНИЕ (Для тебя)
function delPost(id) {
    if(confirm("Удалить этот пост?")) {
        db.collection("posts").doc(id).delete();
    }
}

initApp();
</script>
</body>
</html>
