<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Школа 4 «Е»</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; padding: 20px; color: #1c1c1e; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        .hidden { display: none !important; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; background: #fafafa; font-size: 16px; }
        .btn { background: #007aff; color: white; border: none; padding: 14px; border-radius: 12px; width: 95%; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .admin-btn { background: #34c759 !important; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

    <div id="authScreen" class="card">
        <h2>🔑 Вход в 4 «Е»</h2>
        <input id="loginName" type="text" placeholder="Ваше имя">
        <input id="loginPass" type="password" placeholder="Пароль">
        <button class="btn" onclick="handleAuth()">Войти в систему</button>
        <p style="font-size: 12px; color: #888; margin-top: 15px;">Только для учеников нашего класса</p>
    </div>

    <div id="mainScreen" class="hidden">
        <div class="card" style="background: linear-gradient(135deg, #007aff, #00c6ff); color: white;">
            <h2 id="userGreeting">Привет!</h2>
            <p>Учебный центр экосистемы</p>
        </div>

        <div class="card">
            <h3>📅 Расписание</h3>
            <div id="scheduleEmpty" style="color:#888;">Расписание еще не составлено</div>
            <table id="scheduleTable" class="hidden"></table>
            <button id="adminSchBtn" class="btn admin-btn hidden" onclick="updateSchedule()">📝 Изменить уроки</button>
        </div>

        <div class="card">
            <h3>📚 Домашнее задание</h3>
            <div id="hwContent">Заданий нет. Отдыхаем!</div>
            <button id="adminHwBtn" class="btn admin-btn hidden" onclick="addHomework()">➕ Добавить задание</button>
        </div>

        <div class="card">
            <h3>🎲 Рандомайзер</h3>
            <button class="btn" style="background:#ff9500" onclick="roll()">Кто пойдет к доске?</button>
            <h1 id="rollRes" style="color:#ff9500; font-size: 40px; margin: 15px 0;">?</h1>
        </div>

        <a href="social.html" style="display:block; text-align:center; color:#5856d6; text-decoration:none; margin-top:20px;">Открыть Соцсеть Universe ➔</a>
    </div>

<script>
const firebaseConfig = { apiKey: "AIzaSyDw7KtHos2d88AdeK5eTQSqd5TaAMl2uwc", projectId: "e-my-fam" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const students = ["Умида", "Азия", "Шахсанем", "Шахмир", "Эмир", "Мирас", "Генжеваева_Дилнура", "Самая", "Шахло", "Дидар", "Айсара", "Берик", "Серик", "Мамутова_Дилнура", "Ерасыл", "Асад", "Виктория", "Кошкарова_Дилнура", "Женис", "Барно", "Рашит", "Жасмина", "Темирбаева_Жасмина", "Манас", "Асал", "Алина", "Эла", "Тумирис", "Асемай"];

function handleAuth() {
    const name = document.getElementById('loginName').value.trim();
    const pass = document.getElementById('loginPass').value.trim();

    if ((name === "Ерасыл" && pass === "аминсайта") || (students.includes(name) && pass !== "")) {
        localStorage.setItem('curUser', name);
        showMain(name);
    } else {
        alert("Ошибка входа! Проверь имя и пароль.");
    }
}

function showMain(user) {
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('mainScreen').classList.remove('hidden');
    document.getElementById('userGreeting').innerText = "Привет, " + user + "!";
    
    if (user === "Ерасыл") {
        document.getElementById('adminSchBtn').classList.remove('hidden');
        document.getElementById('adminHwBtn').classList.remove('hidden');
    }
    syncData();
}

function syncData() {
    // Слушаем расписание
    db.collection("school").doc("schedule").onSnapshot(doc => {
        if (doc.exists && doc.data().list.length > 0) {
            document.getElementById('scheduleEmpty').classList.add('hidden');
            const table = document.getElementById('scheduleTable');
            table.classList.remove('hidden');
            let html = "<tr><th>№</th><th>Урок</th></tr>";
            doc.data().list.forEach((lesson, i) => {
                html += `<tr><td>${i+1}</td><td>${lesson}</td></tr>`;
            });
            table.innerHTML = html;
        }
    });

    // Слушаем ДЗ
    db.collection("homework").orderBy("time", "desc").onSnapshot(s => {
        const cont = document.getElementById('hwContent');
        cont.innerHTML = "";
        if (s.empty) { cont.innerText = "Заданий нет!"; return; }
        s.forEach(doc => {
            const d = doc.data();
            cont.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee; text-align:left;"><b>${d.subject}:</b> ${d.task}</div>`;
        });
    });
}

function updateSchedule() {
    const lessons = prompt("Введите уроки через запятую (например: Математика, Русский, ИЗО):");
    if (lessons) {
        db.collection("school").doc("schedule").set({ list: lessons.split(",").map(s => s.trim()) });
    }
}

function addHomework() {
    const subject = prompt("Предмет:");
    const task = prompt("Что задали?");
    if (subject && task) {
        db.collection("homework").add({ subject, task, time: Date.now() });
    }
}

function roll() {
    const winner = students[Math.floor(Math.random() * students.length)];
    document.getElementById('rollRes').innerText = winner;
}
</script>
</body>
</html>
