<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>School Universe Ultra</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --main: #007aff; --social: #5856d6; --bg: #f2f2f7; --white: #ffffff; --text: #000000; --gray: #8e8e93; --card: rgba(255,255,255,0.8); }
        body.dark { --bg: #000000; --white: #1c1c1e; --text: #ffffff; --card: rgba(28,28,30,0.8); }
        
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; transition: 0.3s; overflow-x: hidden; }
        
        .page { display: none; padding: 15px; animation: slideUp 0.4s ease; }
        .active { display: block; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Дизайн карточек */
        .card { background: var(--card); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding: 15px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.1); }
        
        /* Кнопки и инпуты */
        .btn { background: var(--main); color: white; border: none; padding: 15px; border-radius: 14px; width: 100%; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        input, textarea { width: 100%; padding: 14px; border: 1px solid rgba(0,0,0,0.1); border-radius: 14px; box-sizing: border-box; margin-bottom: 12px; background: var(--white); color: var(--text); font-size: 16px; outline: none; }

        /* Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--white); display: flex; border-top: 1px solid rgba(0,0,0,0.1); z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; border: none; background: none; color: var(--gray); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; transition: 0.2s; }
        .nav-item.selected { color: var(--main); }

        /* Спец-элементы */
        .announcement { background: #ff3b30 !important; color: white !important; font-weight: bold; border: none !important; }
        .online-dot { width: 10px; height: 10px; background: #34c759; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px #34c759; }
        .timestamp { font-size: 10px; color: var(--gray); float: right; }
    </style>
</head>
<body>

<div id="loginView" style="text-align: center; padding: 100px 25px;">
    <h1 style="letter-spacing: -1px; font-size: 35px;">Universe</h1>
    <div style="background: var(--main); height: 4px; width: 40px; margin: 0 auto 30px;"></div>
    <input id="uL" placeholder="Имя">
    <input id="uP" type="password" placeholder="Пароль">
    <button class="btn" onclick="doLogin()">Войти</button>
</div>

<div id="mainView" style="display:none;">
    
    <div id="p-school" class="page active">
        <div id="nowStatus" style="background: var(--main); color: white; padding: 15px; border-radius: 15px; text-align: center; font-weight: bold; margin-bottom: 20px;">Загрузка...</div>
        
        <div class="card" style="border-left: 5px solid #ffcc00;">
            <span id="bdayBox">🎂 Проверяем именинников...</span>
        </div>

        <div id="adminTools" style="display:none; margin-bottom: 20px;">
            <p style="font-size: 12px; color: var(--gray);">ИНСТРУМЕНТЫ УПРАВЛЕНИЯ</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn" style="background:#34c759; padding: 10px;" onclick="ask('now')">Событие</button>
                <button class="btn" style="background:#fbc02d; color: black; padding: 10px;" onclick="ask('bday')">Именинник</button>
            </div>
        </div>

        <h3>📅 Расписание</h3>
        <div class="card" id="scheduleBox">...</div>
        
        <h3>📝 Домашнее задание</h3>
        <div id="hwList"></div>
    </div>

    <div id="p-social" class="page">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>🌟 Лента</h2>
            <button class="btn" style="width: 40px; height: 40px; border-radius: 50%;" onclick="ask('post')">+</button>
        </div>
        <div id="postList"></div>
    </div>

    <div id="p-chat" class="page">
        <h2>💬 Чат</h2>
        <div id="chatBox" style="height:calc(100vh - 250px); overflow-y:auto; padding-right: 5px;"></div>
        <div style="display:flex; gap:8px; background: var(--white); padding: 10px; border-radius: 15px;">
            <input id="mIn" placeholder="Сообщение..." style="margin:0; border: none;">
            <button class="btn" onclick="send()" style="width:60px; margin:0;">➡️</button>
        </div>
    </div>

    <div id="p-prof" class="page" style="text-align:center;">
        <div class="card" style="margin-top: 20px;">
            <img id="myAva" src="" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border: 3px solid var(--main);">
            <h2 id="myName">...</h2>
            <div id="myRank" style="font-size: 12px; font-weight: bold; color: var(--main);">Звание...</div>
            <p id="myStatus" style="font-style: italic; color: var(--gray);">...</p>
            <div style="margin-top: 10px;"><span class="online-dot"></span><span style="font-size: 12px; color: #34c759;">В сети</span></div>
        </div>
        
        <button class="btn" style="background:var(--gray); margin-bottom: 8px;" onclick="ask('ava')">Сменить фото</button>
        <button class="btn" style="background:var(--gray); margin-bottom: 8px;" onclick="ask('status')">Новый статус</button>
        <button class="btn" style="background:var(--social); margin-bottom: 20px;" onclick="document.body.classList.toggle('dark')">🌙 Тема</button>
        <button class="btn" style="background:#ff3b30; opacity: 0.6;" onclick="doLogout()">Выйти</button>
    </div>

    <nav class="nav">
        <div class="nav-item selected" onclick="go('p-school', this)">🏫 Школа</div>
        <div class="nav-item" onclick="go('p-social', this)">🌟 Лента</div>
        <div class="nav-item" onclick="go('p-chat', this)">💬 Чат</div>
        <div class="nav-item" onclick="go('p-prof', this)">👤 Профиль</div>
    </nav>
</div>

<div id="modal"><div style="background:var(--white); padding:25px; border-radius:30px; width:85%; max-width:400px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);">
    <h3 id="mTitle" style="margin-top:0"></h3>
    <textarea id="mVal"></textarea>
    <input type="text" id="mImg" placeholder="Ссылка на фото (если нужно)" style="display:none">
    <button class="btn" id="mSave">Сохранить</button>
    <button class="btn" style="background:none; color:var(--gray); margin-top: 5px;" onclick="closeModal()">Отмена</button>
</div></div>

<script>
    const users = [
        {login:"Ерасыл", password:"аминсайта", role:"admin"},
        {login:"СТАРОСТА", password:"пароль123", role:"monitor"},
        {login:"Алина", password:"202564"}
    ];

    firebase.initializeApp({
        apiKey: "AIzaSyDw7KtHos2d88AdeK5eTQSqd5TaAMl2uwc",
        authDomain: "e-my-fam.firebaseapp.com",
        projectId: "e-my-fam",
        storageBucket: "e-my-fam.firebasestorage.app",
        messagingSenderId: "538837431491",
        appId: "1:538837431491:web:9cb1d4706b4d7e97679e76"
    });
    const db = firebase.firestore();
    let me = null, mode = "";

    function doLogin() {
        const u = document.getElementById('uL').value.trim();
        const p = document.getElementById('uP').value.trim();
        const f = users.find(x => x.login === u && x.password === p);
        if(f) { me = f; localStorage.setItem('school_ultra_v1', JSON.stringify(f)); startApp(); }
        else alert("Ошибка!");
    }

    window.onload = () => {
        const s = localStorage.getItem('school_ultra_v1');
        if(s) { me = JSON.parse(s); startApp(); }
    };

    function startApp() {
        document.getElementById('loginView').style.display = "none";
        document.getElementById('mainView').style.display = "block";
        document.getElementById('myName').innerText = me.login;
        if(me.role === 'admin' || me.role === 'monitor') document.getElementById('adminTools').style.display = "block";

        db.collection("info").doc("now").onSnapshot(d => { document.getElementById('nowStatus').innerText = d.exists ? d.data().m : "Уроков нет"; });
        db.collection("info").doc("bdays").onSnapshot(d => { document.getElementById('bdayBox').innerHTML = "🎂 " + (d.exists ? d.data().list : "Сегодня без днюх"); });
        db.collection("info").doc("main").onSnapshot(d => { if(d.exists) document.getElementById('scheduleBox').innerText = d.data().d; });

        // Лента
        db.collection("posts").orderBy("t","desc").onSnapshot(s => {
            const list = document.getElementById('postList'); list.innerHTML = "";
            let myLikes = 0;
            s.forEach(doc => {
                const d = doc.data(); const pid = doc.id;
                if(d.u === me.login) myLikes += (d.l || 0);
                const time = new Date(d.t).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const img = d.img ? `<img src="${d.img}" style="width:100%; border-radius:15px; margin:10px 0;">` : "";
                list.innerHTML += `<div class="card">
                    <span class="timestamp">${time}</span>
                    <span style="color:var(--social); font-weight:bold;">@${d.u}</span>
                    <p>${d.m}</p>${img}
                    <button class="like-btn" onclick="db.collection('posts').doc('${pid}').update({l:${(d.l||0)+1}})">❤️ ${d.l||0}</button>
                </div>`;
            });
            updateRank(myLikes);
        });

        // Чат + Глобальные объявления
        db.collection("chat").orderBy("t","asc").onSnapshot(s => {
            const box = document.getElementById('chatBox'); box.innerHTML = "";
            s.forEach(d => {
                const data = d.data(); const isMe = data.u === me.login;
                const isAnn = data.m.startsWith('!');
                box.innerHTML += `<div style="text-align:${isMe?'right':'left'}; margin-bottom:12px;">
                    <div class="card ${isAnn?'announcement':''}" style="display:inline-block; padding:10px 15px; margin:0; max-width:85%; text-align:left;">
                        <small style="opacity:0.6; font-size:10px;">${data.u}</small><br>${isAnn ? data.m.substring(1) : data.m}
                    </div>
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        db.collection("hw").orderBy("t","desc").onSnapshot(s => {
            const list = document.getElementById('hwList'); list.innerHTML = "";
            s.forEach(d => { list.innerHTML += `<div class="card" style="border-left:4px solid var(--main)"><b>${d.data().u}:</b><br>${d.data().m}</div>`; });
        });

        db.collection("users").doc(me.login).onSnapshot(d => { 
            if(d.exists) { 
                document.getElementById('myAva').src = d.data().a || "https://cdn-icons-png.flaticon.com/512/149/149071.png"; 
                document.getElementById('myStatus').innerText = d.data().s || "Сонный ученик";
            } 
        });
    }

    function updateRank(likes) {
        let r = "НОВИЧОК"; if(likes > 15) r = "ЗВЕЗДА КЛАССА"; if(likes > 40) r = "ЛЕГЕНДА ШКОЛЫ";
        document.getElementById('myRank').innerText = r;
    }

    function go(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('selected'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('selected');
    }

    function ask(m) {
        mode = m; 
        document.getElementById('mTitle').innerText = "Введите данные";
        document.getElementById('mImg').style.display = (m === 'post') ? "block" : "none";
        document.getElementById('modal').style.display = "flex";
    }

    document.getElementById('mSave').onclick = () => {
        const v = document.getElementById('mVal').value.trim();
        const img = document.getElementById('mImg').value.trim();
        if(!v) return;
        if(mode==='now') db.collection("info").doc("now").set({m:v});
        if(mode==='bday') db.collection("info").doc("bdays").set({list:v});
        if(mode==='post') db.collection("posts").add({m:v, u:me.login, t:Date.now(), l:0, img:img});
        if(mode==='ava') db.collection("users").doc(me.login).set({a:v}, {merge:true});
        if(mode==='status') db.collection("users").doc(me.login).set({s:v}, {merge:true});
        if(mode==='time') db.collection("info").doc("main").set({d:v}, {merge:true});
        closeModal();
    };

    function send() {
        const i = document.getElementById('mIn');
        if(i.value.trim()) db.collection("chat").add({m:i.value, u:me.login, t:Date.now()});
        i.value = "";
    }

    function closeModal() { document.getElementById('modal').style.display = "none"; }
    function doLogout() { localStorage.removeItem('school_ultra_v1'); location.reload(); }
</script>
</body>
    </html>
