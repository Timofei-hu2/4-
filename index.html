<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universe Social</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f2f2f7;
            --card-bg: #ffffff;
            --text: #1c1c1e;
            --main: #5856d6;
            --border: #ddd;
        }

        /* Тёмная тема подхватывается автоматически */
        body.dark-mode {
            --bg: #000000;
            --card-bg: #1c1c1e;
            --text: #ffffff;
            --border: #333;
        }

        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; padding-bottom: 20px; }
        
        .nav-header { 
            background: var(--main); 
            color: white; 
            padding: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        .card { background: var(--card-bg); padding: 20px; border-radius: 20px; margin: 15px; border: 1px solid var(--border); }
        
        /* Вайб зона */
        .vibe-zone { text-align: center; }
        .vibe-bar { height: 10px; background: #eee; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        #vibeFill { height: 100%; background: linear-gradient(to right, #ff9500, #5856d6); width: 50%; transition: 0.5s; }
        .vibe-btns button { border: none; background: none; font-size: 30px; cursor: pointer; transition: 0.2s; }
        .vibe-btns button:active { transform: scale(1.3); }

        /* Чат / Лента */
        #chatBox { height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px; }
        .msg { padding: 12px; border-radius: 15px; max-width: 80%; font-size: 14px; position: relative; border: 1px solid var(--border); }
        .msg.me { align-self: flex-end; background: var(--main); color: white; border: none; }
        .msg.others { align-self: flex-start; background: var(--card-bg); }
        .msg-info { font-size: 10px; opacity: 0.7; display: block; margin-bottom: 4px; }

        /* Ввод */
        .input-area { display: flex; gap: 10px; padding: 15px; background: var(--card-bg); border-top: 1px solid var(--border); position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 12px; outline: none; }
        .send-btn { background: var(--main); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
        
        .back-btn { color: white; text-decoration: none; font-size: 14px; border: 1px solid rgba(255,255,255,0.3); padding: 5px 10px; border-radius: 8px; }
    </style>
</head>
<body id="mainBody">

    <header class="nav-header">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> В школу</a>
        <b style="letter-spacing: 1px;">UNIVERSE SOCIAL</b>
        <div style="width: 40px;"></div> </header>

    <div id="socialApp">
        <div class="card vibe-zone">
            <b>Общий вайб класса: <span id="vibeVal">50</span>%</b>
            <div class="vibe-bar"><div id="vibeFill"></div></div>
            <div class="vibe-btns">
                <button onclick="setVibe(true)">🔥</button>
                <button onclick="setVibe(false)">😴</button>
            </div>
            <p style="font-size: 11px; opacity: 0.6; margin-top: 5px;">Жми на эмодзи, чтобы менять вайб!</p>
        </div>

        <div id="chatBox"></div>

        <div class="input-area">
            <input id="msgIn" placeholder="Напиши что-нибудь в ленту...">
            <button class="send-btn" onclick="send()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

<script>
    // Конфиг такой же как в index.html
    const firebaseConfig = { apiKey: "AIzaSyDw7KtHos2d88AdeK5eTQSqd5TaAMl2uwc", projectId: "e-my-fam" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const me = localStorage.getItem('curUser') || "Гость";
    
    // Проверка темы (если в главном меню включили темную)
    if(localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
    }

    // ЛОГИКА ВАЙБА
    function setVibe(up) {
        const ref = db.collection("settings").doc("vibe");
        db.runTransaction(async (t) => {
            const doc = await t.get(ref);
            let val = doc.exists ? doc.data().val : 50;
            val = up ? Math.min(100, val + 2) : Math.max(0, val - 2);
            t.set(ref, { val: val });
        });
    }

    db.collection("settings").doc("vibe").onSnapshot(doc => {
        if(doc.exists) {
            const v = doc.data().val;
            document.getElementById('vibeVal').innerText = v;
            document.getElementById('vibeFill').style.width = v + "%";
        }
    });

    // ОТПРАВКА
    function send() {
        const txt = document.getElementById('msgIn').value;
        if(txt) {
            db.collection("social_posts").add({
                user: me,
                text: txt,
                time: Date.now()
            });
            document.getElementById('msgIn').value = "";
        }
    }

    // ЛЕНТА
    db.collection("social_posts").orderBy("time", "asc").onSnapshot(snap => {
        const box = document.getElementById('chatBox');
        box.innerHTML = "";
        snap.forEach(doc => {
            const p = doc.data();
            const isMe = p.user === me;
            box.innerHTML += `
                <div class="msg ${isMe ? 'me' : 'others'}">
                    <span class="msg-info">${p.user}</span>
                    ${p.text}
                </div>
            `;
        });
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
