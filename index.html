<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universe OS: Brothers</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main: #007aff; --bg: #f2f2f7; --white: #ffffff; --text: #000000; --gray: #8e8e93; }
        /* Стиль СОЦСЕТИ */
        body.social-mode { --main: #ff2d55; --bg: #fce4ec; }
        /* Темная тема */
        body.dark { --bg: #1c1c1e; --white: #2c2c2e; --text: #ffffff; }

        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); transition: 0.4s; padding-bottom: 85px; }
        .page { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--white); padding: 15px; border-radius: 22px; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn { background: var(--main); color: white; border: none; padding: 14px; border-radius: 16px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.2s; }
        
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(var(--white), 0.9); backdrop-filter: blur(15px); display: flex; border-top: 1px solid rgba(0,0,0,0.1); z-index: 1000; }
        .nav-item { flex: 1; border: none; background: none; color: var(--gray); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 20px; }
        .nav-item.selected { color: var(--main); }

        .mode-switcher { position: fixed; top: 15px; right: 15px; background: var(--main); color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: bold; z-index: 1100; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        input, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; background: var(--white); color: var(--text); margin-bottom: 10px; box-sizing: border-box; }
        #chatBox { height: 300px; overflow-y: auto; margin-bottom: 10px; }
    </style>
</head>
<body class="web-mode">

<div class="mode-switcher" onclick="toggleMode()" id="mLabel">🏛️ Режим: Школа</div>

<div id="mainView" style="display:none;">
    
    <div id="p-web" class="page active">
        <div class="card" style="background: var(--main); color: white;">
            <h2 style="margin:0">Школьный Портал</h2>
            <p id="timer" style="font-size:12px; margin-top:5px; opacity:0.9"></p>
        </div>

        <div class="card">
            <b>🎲 Кто к доске?</b>
            <button class="btn" style="background:#ff9500; margin-top:10px" onclick="roll()">Случайный выбор</button>
            <h3 id="rollRes" style="text-align:center; color:var(--main)"></h3>
        </div>

        <div class="card">
            <b>📂 Облако Шпор</b>
            <div id="shporaBox" style="margin-top:10px"></div>
            <button class="btn" style="background:var(--gray); height:35px; padding:0" onclick="ask('shpora')">+</button>
        </div>
    </div>

    <div id="p-social" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
            <h2>Universe Social</h2>
            <button class="btn" style="width:40px; border-radius:50%" onclick="ask('post')">+</button>
        </div>

        <div class="card">
            <b>📊 Вайб класса: <span id="vibeVal">50</span>%</b>
            <div style="height:8px; background:#eee; border-radius:4px; margin:10px 0; overflow:hidden">
                <div id="vibeFill" style="height:100%; background:var(--main); width:50%; transition:1s"></div>
            </div>
            <button onclick="setVibe(true)" style="border:none; background:none; font-size:20px">🔥</button>
            <button onclick="setVibe(false)" style="border:none; background:none; font-size:20px">😴</button>
        </div>

        <div id="feed"></div>
    </div>

    <div id="p-chat" class="page">
        <h2>Чат 💬</h2>
        <div id="chatBox"></div>
        <div style="display:flex; gap:10px">
            <input id="mIn" placeholder="Напиши !шар...">
            <button class="btn" style="width:60px" onclick="sendMsg()">🚀</button>
        </div>
    </div>

    <div id="p-prof" class="page">
        <div class="card" style="text-align:center">
            <h2 id="uName">...</h2>
            <div style="font-size:20px; font-weight:bold; color:#ffcc00">💰 <span id="uCoins">0</span> U-Coins</div>
        </div>

        <div class="card">
            <b>📝 Личные заметки</b>
            <textarea id="uNotes" oninput="saveNotes()" placeholder="Твои секреты..."></textarea>
        </div>

        <button class="btn" onclick="santa()">🎁 Тайный Друг</button>
        <button class="btn" style="background:var(--gray); margin-top:10px" onclick="document.body.classList.toggle('dark')">🌗 Тема</button>
        <button class="btn" style="background:#ff3b30; margin-top:10px" onclick="logout()">Выйти</button>
    </div>

    <nav class="nav">
        <div class="nav-item selected" id="n-web" onclick="go('p-web')">🏛️</div>
        <div class="nav-item" id="n-social" onclick="go('p-social')">🌟</div>
        <div class="nav-item" id="n-chat" onclick="go('p-chat')">💬</div>
        <div class="nav-item" id="n-prof" onclick="go('p-prof')">👤</div>
    </nav>
</div>

<div id="loginView" style="padding:100px 20px; text-align:center">
    <h1>Universe</h1>
    <input id="uLogin" placeholder="Твое имя">
    <button class="btn" onclick="login()">Войти</button>
</div>

<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center;">
    <div style="background:var(--white); padding:30px; border-radius:30px; width:80%">
        <h3 id="mTitle">Ввод</h3>
        <input id="mVal">
        <button class="btn" id="mSave">Сохранить</button>
    </div>
</div>

<script>
    // ТВОЙ FIREBASE
    firebase.initializeApp({
        apiKey: "AIzaSyDw7KtHos2d88AdeK5eTQSqd5TaAMl2uwc",
        authDomain: "e-my-fam.firebaseapp.com",
        projectId: "e-my-fam",
        storageBucket: "e-my-fam.firebasestorage.app",
        messagingSenderId: "538837431491",
        appId: "1:538837431491:web:9cb1d4706b4d7e97679e76"
    });
    const db = firebase.firestore();
    let me = null, editType = "";
    const classList = ["Ерасыл", "Амир", "Мадина", "Дамир", "Саида", "Темур"];

    function login() {
        const n = document.getElementById('uLogin').value.trim();
        if(n) { me = n; localStorage.setItem('u_name', n); start(); }
    }

    window.onload = () => { if(localStorage.getItem('u_name')) { me = localStorage.getItem('u_name'); start(); } };

    function start() {
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('mainView').style.display = 'block';
        document.getElementById('uName').innerText = me;
        document.getElementById('uNotes').value = localStorage.getItem('notes_'+me) || "";

        // Монеты
        db.collection("users").doc(me).onSnapshot(d => {
            const coins = d.exists ? d.data().c : 0;
            document.getElementById('uCoins').innerText = coins;
        });

        // Лента
        db.collection("posts").orderBy("t","desc").onSnapshot(s => {
            const f = document.getElementById('feed'); f.innerHTML = "";
            s.forEach(d => { f.innerHTML += `<div class="card"><b>${d.data().u}</b><p>${d.data().m}</p></div>`; });
        });

        // Шпоры
        db.collection("shpora").onSnapshot(s => {
            const b = document.getElementById('shporaBox'); b.innerHTML = "";
            s.forEach(d => { b.innerHTML += `<div style="margin-bottom:5px">📎 ${d.data().v}</div>`; });
        });

        // Чат
        db.collection("chat").orderBy("t","asc").limitToLast(20).onSnapshot(s => {
            const box = document.getElementById('chatBox'); box.innerHTML = "";
            s.forEach(d => {
                const isMe = d.data().u === me;
                box.innerHTML += `<div style="text-align:${isMe?'right':'left'}"><div style="display:inline-block; padding:10px; border-radius:15px; background:${isMe?'var(--main)':'#eee'}; color:${isMe?'white':'black'}; margin:2px;">${d.data().m}</div></div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
        
        // Вайб
        db.collection("config").doc("vibe").onSnapshot(d => {
            const v = d.exists ? d.data().v : 50;
            document.getElementById('vibeVal').innerText = v;
            document.getElementById('vibeFill').style.width = v + "%";
        });
    }

    function toggleMode() {
        document.body.classList.toggle('social-mode');
        const isSoc = document.body.classList.contains('social-mode');
        document.getElementById('mLabel').innerText = isSoc ? "❤️ Режим: Соцсеть" : "🏛️ Режим: Школа";
        go(isSoc ? 'p-social' : 'p-web');
    }

    function go(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('selected'));
        document.getElementById(id).classList.add('active');
        document.getElementById('n-' + id.split('-')[1]).classList.add('selected');
    }

    function sendMsg() {
        const i = document.getElementById('mIn'); if(!i.value) return;
        db.collection("chat").add({u:me, m:i.value, t:Date.now()});
        if(i.value.startsWith("!шар")) {
            const a = ["Да", "Нет", "Возможно", "100%", "Никогда"];
            setTimeout(() => db.collection("chat").add({u:"🤖 Бот", m: "🔮 " + a[Math.floor(Math.random()*a.length)], t:Date.now()+1}), 500);
        }
        i.value = "";
    }

    function roll() {
        const name = classList[Math.floor(Math.random()*classList.length)];
        document.getElementById('rollRes').innerText = name + "!";
        confetti();
    }

    function setVibe(up) {
        const ref = db.collection("config").doc("vibe");
        db.runTransaction(async (t) => {
            const d = await t.get(ref);
            let nv = (d.data().v || 50) + (up ? 1 : -1);
            t.update(ref, {v: Math.max(0, Math.min(100, nv))});
        });
    }

    function ask(t) { editType = t; document.getElementById('modal').style.display='flex'; }
    document.getElementById('mSave').onclick = () => {
        const v = document.getElementById('mVal').value;
        if(editType === 'post') db.collection("posts").add({u:me, m:v, t:Date.now()});
        if(editType === 'shpora') db.collection("shpora").add({v:v});
        document.getElementById('modal').style.display='none';
    };

    function saveNotes() { localStorage.setItem('notes_'+me, document.getElementById('uNotes').value); }
    function santa() { alert("Сегодня твой секретный друг: " + classList[Math.floor(Math.random()*classList.length)]); }
    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
