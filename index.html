<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universe Master Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main: #007aff; --bg: #f2f2f7; --white: #ffffff; --text: #000000; --accent: #ff2d55; }
        body.dark { --bg: #0b0b0d; --white: #1c1c1e; --text: #ffffff; }
        
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; padding-bottom: 90px; }
        .page { display: none; padding: 20px; animation: scaleUp 0.3s ease; }
        .active { display: block; }
        @keyframes scaleUp { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .card { background: var(--white); padding: 20px; border-radius: 25px; margin-bottom: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.04); position: relative; }
        .btn { background: var(--main); color: white; border: none; padding: 16px; border-radius: 18px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.96); }

        /* ЗВАНИЯ */
        .rank-tag { font-size: 10px; padding: 4px 10px; border-radius: 20px; background: var(--main); color: white; text-transform: uppercase; margin-left: 10px; }
        
        /* ЧАТ СООБЩЕНИЯ */
        .msg { margin-bottom: 15px; display: flex; flex-direction: column; }
        .msg-bubble { padding: 12px 16px; border-radius: 20px; max-width: 80%; font-size: 14px; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .my-msg { align-items: flex-end; }
        .my-msg .msg-bubble { background: var(--main); color: white; }
        .other-msg .msg-bubble { background: var(--white); color: var(--text); border: 1px solid #eee; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: rgba(var(--white), 0.85); backdrop-filter: blur(20px); display: flex; z-index: 1000; }
        .nav-item { flex: 1; border: none; background: none; color: #8e8e93; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; }
        .nav-item.selected { color: var(--main); }

        #onlineCounter { font-size: 12px; color: #34c759; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div id="mainView" style="display:none;">
    
    <div id="p-school" class="page active">
        <div class="card" style="background: linear-gradient(135deg, #007aff, #5856d6); color: white;" onclick="go('p-social')">
            <h2 style="margin:0">✨ Соцсеть Класса</h2>
            <p style="opacity: 0.8; font-size: 12px;">Проверь новые лайки и посты</p>
        </div>

        <div id="adm-tools" style="display:none; margin-top: 15px;">
            <div class="card" style="background: #fff3cd; border: 1px solid #ffeeba; color: #856404;">
                <h4 style="margin:0">Команда Админа:</h4>
                <button class="btn" style="background: #ffc107; color: black; margin-top:10px" onclick="pickRandom()">🎯 Кто к доске?</button>
                <div id="luckyResult" style="text-align:center; font-weight:bold; margin-top:10px"></div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin: 15px 0;">
                <button class="btn" onclick="ask('now')">Статус</button>
                <button class="btn" style="background: var(--accent)" onclick="ask('hw')">+ ДЗ</button>
            </div>
        </div>

        <h3 style="margin-top:20px">📖 Домашнее задание</h3>
        <div id="hwList"></div>
    </div>

    <div id="p-social" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <button onclick="go('p-school')" style="background:none; border:none; font-size:20px;">🏠</button>
            <h2 style="margin:0">Лента</h2>
            <button class="btn" style="width:45px; height:45px; border-radius:50%" onclick="ask('post')">+</button>
        </div>
        <div id="postList"></div>
    </div>

    <div id="p-chat" class="page">
        <span id="onlineCounter">● 14 человек онлайн</span>
        <div id="chatBox" style="height: calc(100vh - 280px); overflow-y: auto;"></div>
        <div style="display:flex; gap:10px; margin-top:15px; background: var(--white); padding: 10px; border-radius: 20px;">
            <input id="mIn" placeholder="Сообщение..." style="flex:1; border:none; background:none; outline:none; color: var(--text);">
            <button class="btn" style="width:60px; padding:10px;" onclick="send()">🚀</button>
        </div>
    </div>

    <div id="p-prof" class="page" style="text-align: center;">
        <div class="card">
            <img id="myAva" src="" style="width:100px; height:100px; border-radius:50%; border: 3px solid var(--main);">
            <h2 id="myName">... <span id="myRank" class="rank-tag">Новичок</span></h2>
            <p id="myBio" style="color: #8e8e93;">Ученик Universe</p>
        </div>
        <button class="btn" style="background: #8e8e93; margin-bottom:10px" onclick="ask('ava')">Сменить фото</button>
        <button class="btn" style="background: var(--main)" onclick="document.body.classList.toggle('dark')">🌗 Тема</button>
        <button class="btn" style="background: #ff3b30; margin-top: 30px;" onclick="doLogout()">Выход</button>
    </div>

    <nav class="nav">
        <div class="nav-item selected" id="n-school" onclick="go('p-school')">🏠 Школа</div>
        <div class="nav-item" id="n-chat" onclick="go('p-chat')">💬 Чат</div>
        <div class="nav-item" id="n-prof" onclick="go('p-prof')">👤 Профиль</div>
    </nav>
</div>

<div id="loginView" style="padding: 100px 40px; text-align: center;">
    <h1>Universe</h1>
    <input id="uL" placeholder="Имя" style="width:100%; padding:15px; margin-bottom:10px; border-radius:15px; border:1px solid #ddd;">
    <input id="uP" type="password" placeholder="Пароль" style="width:100%; padding:15px; margin-bottom:20px; border-radius:15px; border:1px solid #ddd;">
    <button class="btn" onclick="doLogin()">Войти</button>
</div>

<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center; backdrop-filter: blur(5px);">
    <div style="background: var(--white); padding: 30px; border-radius: 30px; width: 85%;">
        <h3 id="mTitle">Редактировать</h3>
        <textarea id="mVal" style="width:100%; height: 100px; border-radius: 15px; padding: 10px;"></textarea>
        <button class="btn" id="mSave" style="margin-top:10px;">Сохранить</button>
    </div>
</div>

<script>
    const users = [
        {login:"Ерасыл", password:"аминсайта", role:"admin"},
        {login:"СТАРОСТА", password:"пароль123", role:"monitor"},
        {login:"Алина", password:"202564"}
    ];

    firebase.initializeApp({
        apiKey: "AIzaSyDw7KtHos2d88AdeK5eTQSqd5TaAMl2uwc",
        authDomain: "e-my-fam.firebaseapp.com",
        projectId: "e-my-fam",
        storageBucket: "e-my-fam.firebasestorage.app",
        messagingSenderId: "538837431491",
        appId: "1:538837431491:web:9cb1d4706b4d7e97679e76"
    });
    const db = firebase.firestore();
    let me = null, mode = "";

    // 🏆 УМНАЯ СИСТЕМА РАНГОВ
    function checkRank(postCount) {
        if(postCount > 20) return "Легенда";
        if(postCount > 10) return "Олд";
        if(postCount > 5) return "Актив";
        return "Новичок";
    }

    function doLogin() {
        const u = document.getElementById('uL').value.trim(), p = document.getElementById('uP').value.trim();
        const f = users.find(x => x.login === u && x.password === p);
        if(f) { me = f; localStorage.setItem('u_session_v2', JSON.stringify(f)); startApp(); }
        else alert("Ошибка!");
    }

    window.onload = () => {
        const s = localStorage.getItem('u_session_v2');
        if(s) { me = JSON.parse(s); startApp(); }
    };

    function startApp() {
        document.getElementById('loginView').style.display = "none";
        document.getElementById('mainView').style.display = "block";
        document.getElementById('myName').innerHTML = me.login + ' <span id="myRank" class="rank-tag">...</span>';
        if(me.role === 'admin') document.getElementById('adm-tools').style.display = "block";

        // Посты и Ранги
        db.collection("posts").onSnapshot(s => {
            let myPosts = 0;
            const list = document.getElementById('postList'); list.innerHTML = "";
            s.forEach(doc => {
                const d = doc.data();
                if(d.u === me.login) myPosts++;
                list.innerHTML += `<div class="card"><b>@${d.u}</b><p>${d.m}</p><button class="btn" style="width:70px; background:none; color:red; border:1px solid #ddd" onclick="db.collection('posts').doc('${doc.id}').update({l:${(d.l||0)+1}})">❤️ ${d.l||0}</button></div>`;
            });
            document.getElementById('myRank').innerText = checkRank(myPosts);
        });

        // Живой Чат
        db.collection("chat").orderBy("t","asc").onSnapshot(s => {
            const b = document.getElementById('chatBox'); b.innerHTML = "";
            s.forEach(d => {
                const isMe = d.data().u === me.login;
                b.innerHTML += `<div class="msg ${isMe?'my-msg':'other-msg'}"><div class="msg-bubble"><b>${d.data().u}</b><br>${d.data().m}</div></div>`;
            });
            b.scrollTop = b.scrollHeight;
        });

        db.collection("hw").orderBy("t","desc").onSnapshot(s => {
            const l = document.getElementById('hwList'); l.innerHTML = "";
            s.forEach(d => { l.innerHTML += `<div class="card" style="border-left:5px solid var(--main)"><b>${d.data().u}:</b><br>${d.data().m}</div>`; });
        });

        db.collection("users").doc(me.login).onSnapshot(d => { if(d.exists) document.getElementById('myAva').src = d.data().a || "https://cdn-icons-png.flaticon.com/512/149/149071.png"; });
    }

    function send() {
        const i = document.getElementById('mIn');
        if(i.value.trim()) {
            db.collection("chat").add({m:i.value, u:me.login, t:Date.now()});
            confetti({ particleCount: 50, spread: 60, origin: { y: 0.8 } }); // ПРАЗДНИК ПРИ ОТПРАВКЕ
        }
        i.value = "";
    }

    function pickRandom() {
        const names = users.map(u => u.login);
        let res = document.getElementById('luckyResult');
        let i = 0;
        let timer = setInterval(() => {
            res.innerText = names[Math.floor(Math.random() * names.length)];
            i++;
            if(i > 10) { clearInterval(timer); res.innerText = "🔥 " + res.innerText + " 🔥"; }
        }, 100);
    }

    function go(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('selected'));
        document.getElementById(id).classList.add('active');
        const map = {'p-school':'n-school', 'p-chat':'n-chat', 'p-prof':'n-prof'};
        if(map[id]) document.getElementById(map[id]).classList.add('selected');
    }

    function ask(m) { mode = m; document.getElementById('modal').style.display = "flex"; }

    document.getElementById('mSave').onclick = () => {
        const v = document.getElementById('mVal').value.trim();
        if(!v) return;
        if(mode==='hw') db.collection("hw").add({m:v, u:me.login, t:Date.now()});
        if(mode==='post') db.collection("posts").add({m:v, u:me.login, t:Date.now(), l:0});
        if(mode==='ava') db.collection("users").doc(me.login).set({a:v}, {merge:true});
        document.getElementById('modal').style.display = "none";
        document.getElementById('mVal').value = "";
    };

    function doLogout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
