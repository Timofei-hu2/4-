<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Школа 4 «Е»: Официальный портал</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; padding: 15px; color: #1c1c1e; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .hidden { display: none !important; }
        
        /* Профиль */
        .user-card { display: flex; align-items: center; gap: 15px; }
        .user-ava { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; background: #eee; border: 2px solid #007aff; }
        .role-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #007aff; color: white; vertical-align: middle; }

        /* Личка */
        #chatBox { height: 150px; overflow-y: auto; background: #f9f9f9; padding: 10px; border-radius: 10px; font-size: 13px; border: 1px solid #eee; margin: 10px 0; }
        .msg { margin-bottom: 5px; padding: 5px; border-radius: 5px; background: white; border-left: 3px solid #007aff; }

        /* Магазин ролей */
        .shop-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .price { color: #ff9500; font-weight: bold; }

        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { background: #007aff; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn-adm { background: #34c759; margin-top: 5px; }
    </style>
</head>
<body>

<div id="authBox" class="card" style="text-align: center; margin-top: 50px;">
    <h2>🏫 Вход в систему</h2>
    <input id="uL" placeholder="Твое имя">
    <input id="uP" type="password" placeholder="Пароль">
    <button class="btn" onclick="login()">Войти</button>
</div>

<div id="app" class="hidden">
    <div class="card user-card">
        <img id="myAva" src="https://i.imgur.com/6VBx3io.png" class="user-ava">
        <div>
            <b id="myName">Имя</b> <span id="myRole" class="role-tag">Ученик</span>
            <div style="font-size: 12px; color: #888; margin-top: 4px;">Баланс: <span id="myBal">0</span> 💰</div>
        </div>
    </div>

    <div class="card">
        <h3>🏪 Магазин ролей</h3>
        <div class="shop-item"><span>🌟 VIP статус</span> <span class="price">2000 💰</span></div>
        <div class="shop-item"><span>🛡️ Модератор</span> <span class="price">5000 💰</span></div>
        <p style="font-size: 11px; color: #888; text-align: center;">* Для покупки пиши Ерасылу в личку!</p>
    </div>

    <div class="card">
        <h3>✉️ Личные сообщения</h3>
        <div id="chatBox"></div>
        <select id="sendTo"><option value="all">Всем (Общий)</option></select>
        <input id="msgText" placeholder="Напиши что-нибудь...">
        <button class="btn" onclick="sendMsg()" style="padding: 8px;">Отправить</button>
    </div>

    <div id="admUI" class="card hidden" style="border: 2px solid #34c759;">
        <h4 style="color:#34c759; margin:0 0 10px 0;">👑 Панель Ерасыла</h4>
        <input id="admUser" placeholder="Имя ученика">
        <input id="admVal" placeholder="Значение (Роль или Баллы)">
        <button class="btn btn-adm" onclick="giveRole()">Выдать роль</button>
        <button class="btn btn-adm" onclick="giveMoney()">Выдать баллы</button>
    </div>

    <div class="card">
        <h3>📅 Расписание</h3>
        <div id="schShow">Загрузка...</div>
    </div>

    <a href="social.html" style="display:block; text-align:center; color:#007aff; text-decoration:none; margin-bottom: 20px;">В Соцсеть ➔</a>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyDw7KtHos2d88AdeK5eTQSqd5TaAMl2uwc", projectId: "e-my-fam" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const students = ["Умида", "Азия", "Шахсанем", "Шахмир", "Эмир", "Мирас", "Генжеваева_Дилнура", "Самая", "Шахло", "Дидар", "Айсара", "Берик", "Серик", "Мамутова_Дилнура", "Ерасыл", "Асад", "Виктория", "Кошкарова_Дилнура", "Женис", "Барно", "Рашит", "Жасмина", "Темирбаева_Жасмина", "Манас", "Асал", "Алина", "Эла", "Тумирис", "Асемай"];

let me = "";

function login() {
    const n = document.getElementById('uL').value.trim();
    const p = document.getElementById('uP').value.trim();
    if((n === "Ерасыл" && p === "аминсайта") || (students.includes(n) && p !== "")) {
        me = n;
        document.getElementById('authBox').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('myName').innerText = me;
        if(me === "Ерасыл") document.getElementById('admUI').classList.remove('hidden');
        
        // Заполняем список для лички
        const sel = document.getElementById('sendTo');
        students.forEach(s => { if(s !== me) sel.innerHTML += `<option value="${s}">${s}</option>`; });
        
        initUser();
        listenMessages();
    } else { alert("Ошибка!"); }
}

function initUser() {
    db.collection("users").doc(me).onSnapshot(doc => {
        if(doc.exists) {
            const d = doc.data();
            document.getElementById('myBal').innerText = d.bal || 0;
            document.getElementById('myRole').innerText = d.role || "Ученик";
            if(d.ava) document.getElementById('myAva').src = d.ava;
        } else {
            db.collection("users").doc(me).set({ bal: 0, role: "Ученик", ava: "" });
        }
    });
}

// ЛОГИКА ЛИЧКИ
function sendMsg() {
    const to = document.getElementById('sendTo').value;
    const txt = document.getElementById('msgText').value;
    if(txt) {
        db.collection("messages").add({ from: me, to: to, msg: txt, time: Date.now() });
        document.getElementById('msgText').value = "";
    }
}

function listenMessages() {
    db.collection("messages").orderBy("time", "asc").limitToLast(20).onSnapshot(s => {
        const box = document.getElementById('chatBox'); box.innerHTML = "";
        s.forEach(doc => {
            const d = doc.data();
            // Показываем если сообщение всем ИЛИ лично мне ИЛИ от меня
            if(d.to === "all" || d.to === me || d.from === me) {
                const label = d.to === "all" ? "[ОБЩИЙ]" : `[ЛС для ${d.to}]`;
                box.innerHTML += `<div class="msg"><b>${d.from} ${label}:</b> ${d.msg}</div>`;
            }
        });
        box.scrollTop = box.scrollHeight;
    });
}

// АДМИНКА ЕРАСЫЛА
function giveRole() {
    const u = document.getElementById('admUser').value;
    const r = document.getElementById('admVal').value;
    db.collection("users").doc(u).update({ role: r });
    alert("Роль выдана!");
}

function giveMoney() {
    const u = document.getElementById('admUser').value;
    const m = parseInt(document.getElementById('admVal').value);
    db.collection("users").doc(u).update({ bal: firebase.firestore.FieldValue.increment(m) });
    alert("Баллы начислены!");
}
</script>
</body>
</html>
