<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>School & Social</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --main: #007aff; --social: #5856d6; --bg: #f2f2f7; --white: #ffffff; --text: #000000; --gray: #8e8e93; }
        body.dark { --bg: #000000; --white: #1c1c1e; --text: #ffffff; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 75px; transition: 0.3s; }
        
        .page { display: none; padding: 15px; animation: fadeIn 0.2s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--white); padding: 15px; border-radius: 15px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn { background: var(--main); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        
        /* Стили для соцсети */
        .post-user { font-weight: bold; color: var(--social); margin-bottom: 5px; display: block; }
        .like-btn { background: none; border: 1px solid #ddd; padding: 5px 12px; border-radius: 20px; color: #ff2d55; cursor: pointer; font-size: 14px; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--white); display: flex; border-top: 1px solid #ddd; z-index: 100; }
        .nav-item { flex: 1; border: none; background: none; color: var(--gray); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; }
        .nav-item.selected { color: var(--main); }
        .nav-item i { font-size: 22px; margin-bottom: 2px; }

        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; margin-bottom: 10px; background: var(--white); color: var(--text); font-size: 16px; }
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:200; align-items:center; justify-content:center; }
    </style>
</head>
<body>

<div id="loginView" style="text-align: center; padding: 80px 20px;">
    <h1 style="color:var(--main); font-size: 32px;">School Ready</h1>
    <p style="color:var(--gray)">Твой личный кабинет</p>
    <div style="margin-top:30px;">
        <input id="uL" placeholder="Имя">
        <input id="uP" type="password" placeholder="Пароль">
        <button class="btn" onclick="doLogin()">Войти</button>
    </div>
</div>

<div id="mainView" style="display:none;">
    <div id="p-school" class="page active">
        <h2 style="color:var(--main)">📚 Учёба</h2>
        <div class="card">
            <h3>📅 Расписание</h3>
            <div id="scheduleBox" style="white-space:pre-wrap">Загрузка...</div>
            <div id="adm-t" style="display:none;"><button class="btn" style="margin-top:10px" onclick="ask('time')">Изменить</button></div>
        </div>
        <h3>📝 Домашнее задание</h3>
        <div id="adm-h" style="display:none;"><button class="btn" onclick="ask('hw')">Добавить ДЗ</button></div>
        <div id="hwList"></div>
    </div>

    <div id="p-social" class="page">
        <h2 style="color:var(--social)">🌟 Соцсеть</h2>
        <button class="btn" style="background:var(--social)" onclick="ask('post')">📸 Создать пост</button>
        <div id="postList"></div>
    </div>

    <div id="p-chat" class="page">
        <h2 style="color:var(--main)">💬 Чат</h2>
        <div id="chatBox" style="height:calc(100vh - 220px); overflow-y:auto; margin-bottom:10px;"></div>
        <div style="display:flex; gap:8px;">
            <input id="mIn" placeholder="Сообщение..." style="margin:0">
            <button class="btn" onclick="send()" style="width:70px; margin:0">🚀</button>
        </div>
    </div>

    <div id="p-prof" class="page" style="text-align:center;">
        <div style="margin:20px 0;">
            <img id="myAva" src="" style="width:110px; height:110px; border-radius:50%; object-fit:cover; border:3px solid var(--main);">
            <h2 id="myName">Имя</h2>
            <p id="myStatus" style="color:var(--gray)">Настроение не задано</p>
        </div>
        <button class="btn" style="background:var(--gray)" onclick="ask('ava')">Сменить фото</button>
        <button class="btn" style="background:var(--gray)" onclick="ask('status')">Изменить статус</button>
        <button class="btn" style="background:#5856d6" onclick="document.body.classList.toggle('dark')">🌙 Тема</button>
        <button class="btn" style="background:#ff3b30; margin-top:20px;" onclick="doLogout()">Выйти</button>
    </div>

    <nav class="nav">
        <button class="nav-item selected" onclick="go('p-school', this)"><i>🏫</i>Школа</button>
        <button class="nav-item" onclick="go('p-social', this)"><i>🌍</i>Соцсеть</button>
        <button class="nav-item" onclick="go('p-chat', this)"><i>💬</i>Чат</button>
        <button class="nav-item" onclick="go('p-prof', this)"><i>👤</i>Я</button>
    </nav>
</div>

<div id="modal"><div style="background:var(--white); padding:20px; border-radius:20px; width:85%;">
    <h3 id="mTitle" style="margin:0 0 15px 0;"></h3>
    <textarea id="mVal"></textarea>
    <button class="btn" id="mSave">Сохранить</button>
    <button class="btn" style="background:#eee; color:black" onclick="document.getElementById('modal').style.display='none'">Отмена</button>
</div></div>

<script>
    const users = [
        {login:"Ерасыл", password:"аминсайта", role:"admin"},
        {login:"Умида", password:"Умида1"}, {login:"Азия", password:"азия002"},
        {login:"Шахсанем", password:"шахсанем090"}, {login:"Шахмир", password:"шахнепас"},
        {login:"Эмир", password:"эмир777"}, {login:"Мирас", password:"мирас111"},
        {login:"Генжеваева_Дилнура", password:"дилнураN1"}, {login:"Самая", password:"елдар444"},
        {login:"Шахло", password:"фурхат"}, {login:"Дидар", password:"дид2022"},
        {login:"Айсара", password:"улугбек"}, {login:"Берик", password:"серик"},
        {login:"Серик", password:"берик"}, {login:"Мамутова_Дилнура", password:"дилнураN2"},
        {login:"Асад", password:"мурат"}, {login:"Виктория", password:"констат"},
        {login:"Кошкарова_Дилнура", password:"дилнураN3"}, {login:"Женис", password:"полат"},
        {login:"Барно", password:"Улугбек1112"}, {login:"Рашит", password:"Самат"},
        {login:"Жасмина", password:"199112346"}, {login:"Темирбаева_Жасмина", password:"жасминаN2"},
        {login:"Манас", password:"1995514519"}, {login:"Асал", password:"1955767412"},
        {login:"Алина", password:"202564"}, {login:"Эла", password:"ЖиЕнНаСбКвАкЯ"},
        {login:"Тумирис", password:"логика"}, {login:"Асемай", password:"какой_пароль?"}
    ];

    firebase.initializeApp({
        apiKey: "AIzaSyDw7KtHos2d88AdeK5eTQSqd5TaAMl2uwc",
        authDomain: "e-my-fam.firebaseapp.com",
        projectId: "e-my-fam",
        storageBucket: "e-my-fam.firebasestorage.app",
        messagingSenderId: "538837431491",
        appId: "1:538837431491:web:9cb1d4706b4d7e97679e76"
    });
    const db = firebase.firestore();
    let me = null, mode = "";

    window.onload = () => {
        const s = localStorage.getItem('school_user');
        if(s) { me = JSON.parse(s); startApp(); }
    };

    function doLogin() {
        const l = uL.value.trim(), p = uP.value.trim();
        const f = users.find(x => x.login === l && x.password === p);
        if(f) { me = f; localStorage.setItem('school_user', JSON.stringify(f)); startApp(); }
        else alert("Ошибка входа!");
    }

    function doLogout() { localStorage.removeItem('school_user'); location.reload(); }

    function startApp() {
        loginView.style.display="none"; mainView.style.display="block";
        myName.innerText = me.login;
        if(me.role === 'admin') { adm-h.style.display="block"; adm-t.style.display="block"; }

        // Лента Соцсети
        db.collection("posts").orderBy("t","desc").onSnapshot(s => {
            postList.innerHTML = "";
            s.forEach(d => {
                const data = d.data();
                postList.innerHTML += `<div class="card">
                    <span class="post-user">@${data.u}</span>
                    <p>${data.m}</p>
                    <button class="like-btn" onclick="db.collection('posts').doc('${d.id}').update({l:${(data.l||0)+1}})">❤️ ${data.l||0}</button>
                </div>`;
            });
        });

        // ДЗ
        db.collection("hw").orderBy("t","desc").onSnapshot(s => {
            hwList.innerHTML = "";
            s.forEach(d => { hwList.innerHTML += `<div class="card" style="border-left:4px solid var(--main)"><b>${d.data().u}:</b><br>${d.data().m}</div>`; });
        });

        // Чат
        db.collection("chat").orderBy("t","asc").onSnapshot(s => {
            chatBox.innerHTML = "";
            s.forEach(d => {
                const data = d.data(); const isMe = data.u === me.login;
                chatBox.innerHTML += `<div style="text-align:${isMe?'right':'left'}; margin-bottom:10px;">
                    <div style="display:inline-block; padding:10px; border-radius:15px; background:${isMe? 'var(--main)':'var(--white)'}; color:${isMe?'white':'black'}; border:${isMe?'none':'1px solid #ddd'}">
                        <small>${data.u}</small><br>${data.m}
                    </div>
                </div>`;
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        db.collection("info").doc("main").onSnapshot(d => { if(d.exists) scheduleBox.innerText = d.data().d; });
        db.collection("users").doc(me.login).onSnapshot(d => { 
            if(d.exists) { myAva.src = d.data().a || ""; myStatus.innerText = d.data().s || "Без статуса"; } 
        });
    }

    function go(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('selected'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('selected');
    }

    function ask(m) {
        mode = m; mTitle.innerText = "Напишите текст"; mVal.value = ""; modal.style.display = "flex";
        mSave.onclick = () => {
            const v = mVal.value.trim(); if(!v) return;
            if(mode==='post') db.collection("posts").add({m:v, u:me.login, t:Date.now(), l:0});
            if(mode==='hw') db.collection("hw").add({m:v, u:me.login, t:Date.now()});
            if(mode==='ava') db.collection("users").doc(me.login).set({a:v}, {merge:true});
            if(mode==='status') db.collection("users").doc(me.login).set({s:v}, {merge:true});
            if(mode==='time') db.collection("info").doc("main").set({d:v}, {merge:true});
            modal.style.display="none";
        };
    }

    function send() {
        if(mIn.value.trim()) db.collection("chat").add({m:mIn.value, u:me.login, t:Date.now()});
        mIn.value = "";
    }
</script>
</body>
</html>
